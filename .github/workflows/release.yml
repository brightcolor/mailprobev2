name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer tag (for example v0.1.1)
        required: true
        type: string
      target:
        description: Branch or commit to tag
        required: false
        default: main
        type: string

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target }}
          fetch-depth: 0

      - name: Validate version
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like v1.2.3 or v1.2.3-rc.1" >&2
            exit 1
          fi
          if git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ inputs.version }} already exists" >&2
            exit 1
          fi

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.version }}" \
            --title "${{ inputs.version }}" \
            --notes "Docker images are published by the ci workflow as ghcr.io/${{ github.repository }}:${{ inputs.version }}, semver aliases, and sha tags."
